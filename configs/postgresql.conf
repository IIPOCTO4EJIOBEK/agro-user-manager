# ============================================================================
# POSTGRESQL CONFIGURATION - FIXED & OPTIMIZED
# Сервер: 10.0.1.200 (Primary)
# Назначение: Дополнительная БД Bitrix24
# ============================================================================

# ------------------------------------------------------------------------------
# FILE LOCATIONS
# ------------------------------------------------------------------------------
data_directory = '/var/lib/pgsql/data'
hba_file = '/var/lib/pgsql/data/pg_hba.conf'
ident_file = '/var/lib/pgsql/data/pg_ident.conf'
external_pid_file = '/var/run/postgresql/postgresql.pid'

# ------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
# ------------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 500
superuser_reserved_connections = 3
unix_socket_directories = '/var/run/postgresql'
authentication_timeout = 1min
password_encryption = scram-sha-256

# ------------------------------------------------------------------------------
# SSL
# ------------------------------------------------------------------------------
ssl = on
ssl_cert_file = '/etc/pki/tls/certs/server.crt'
ssl_key_file = '/etc/pki/tls/private/server.key'
ssl_ciphers = 'HIGH:MEDIUM:+3DES:!aNULL'
ssl_prefer_server_ciphers = on

# ------------------------------------------------------------------------------
# RESOURCE USAGE (except WAL)
# ------------------------------------------------------------------------------
shared_buffers = 32GB
dynamic_shared_memory_type = posix
effective_cache_size = 96GB
work_mem = 256MB
hash_mem_multiplier = 2.0
maintenance_work_mem = 2GB
autovacuum_work_mem = 512MB
wal_buffers = 64MB
min_wal_size = 2GB
max_wal_size = 8GB
checkpoint_completion_target = 0.9
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ------------------------------------------------------------------------------
# WRITE-AHEAD LOG (ИСПРАВЛЕНО - ПОЛНОЕ ЛОГИРОВАНИЕ)
# ------------------------------------------------------------------------------
wal_level = replica
fsync = on
synchronous_commit = on
wal_sync_method = fdatasync
full_page_writes = on
wal_compression = on
wal_log_hints = on
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 1GB
hot_standby = on
hot_standby_feedback = on

# ------------------------------------------------------------------------------
# REPLICATION
# ------------------------------------------------------------------------------
max_worker_processes = 16
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# ------------------------------------------------------------------------------
# QUERY TUNING
# ------------------------------------------------------------------------------
enable_seqscan = on
enable_indexscan = on
enable_indexonlyscan = on
enable_bitmapscan = on
enable_tidscan = on
enable_sort = on
enable_nestloop = on
enable_mergejoin = on
enable_hashjoin = on

# ------------------------------------------------------------------------------
# REPORTING / LOGGING (ИСПРАВЛЕНО - ДЕТАЛЬНОЕ ЛОГИРОВАНИЕ)
# ------------------------------------------------------------------------------
logging_collector = on
log_directory = '/var/log/postgresql'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on

# Что логировать
log_checkpoints = on
log_connections = on
log_disconnections = on
log_duration = off
log_error_verbosity = default
log_hostname = on
log_line_prefix = '%m [%p] %q%u@%d '
log_lock_waits = on
log_statement = 'ddl'
log_temp_files = 0
log_timezone = 'Europe/Moscow'
log_autovacuum_min_duration = 0

# Slow query logging
log_min_duration_statement = 1000

# ------------------------------------------------------------------------------
# AUTOVACUUM
# ------------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_freeze_max_age = 200000000
autovacuum_multixact_freeze_max_age = 400000000
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 200

# ------------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
# ------------------------------------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'Europe/Moscow'
lc_messages = 'ru_RU.UTF-8'
lc_monetary = 'ru_RU.UTF-8'
lc_numeric = 'ru_RU.UTF-8'
lc_time = 'ru_RU.UTF-8'
default_text_search_config = 'pg_catalog.russian'

# ------------------------------------------------------------------------------
# LOCK MANAGEMENT
# ------------------------------------------------------------------------------
deadlock_timeout = 1s
max_locks_per_transaction = 64
max_pred_locks_per_transaction = 64

# ------------------------------------------------------------------------------
# VERSION COMPATIBILITY
# ------------------------------------------------------------------------------
transform_null_equals = off
array_nulls = on
backslash_quote = safe_encoding
escape_string_warning = on
standard_conforming_strings = on
synchronize_seqscans = on

# ------------------------------------------------------------------------------
# MEMORY
# ------------------------------------------------------------------------------
huge_pages = try
huge_page_size = 0

# ------------------------------------------------------------------------------
# ASYNC BEHAVIOR
# ------------------------------------------------------------------------------
async_commit = off
vacuum_cost_delay = 0
vacuum_cost_page_hit = 1
vacuum_cost_page_miss = 2
vacuum_cost_page_dirty = 20
vacuum_cost_limit = 200
