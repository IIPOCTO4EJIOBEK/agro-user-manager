# /root/npm/data/nginx/custom/http_top.conf (excerpt from NPM 10.0.1.110)

upstream bitrix_web {
    server 10.0.1.50:80;
    keepalive 32;
}

upstream bitrix_push {
    server 10.0.1.230:8893;
    keepalive 32;
}

large_client_header_buffers 4 64k;
client_header_buffer_size 16k;


# Nginx Proxy Host 8.conf (b24.ahprostory.ru) (excerpt)

server {
  listen 80;
  listen [::]:80;
  server_name b24.ahprostory.ru;
  include conf.d/include/letsencrypt-acme-challenge.conf;
  
  location ^~ /bitrix/tools/rtc/ {
    proxy_pass http://bitrix_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    # ...
  }

  location / {
    proxy_pass http://bitrix_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Ssl on;
  }
}
