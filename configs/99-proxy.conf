# JSON Log Format for Analytics
log_format json_analytics escape=json '{'
    '"time_local":"$time_local",'
    '"remote_addr":"$remote_addr",'
    '"http_host":"$http_host",'
    '"remote_user":"$remote_user",'
    '"request":"$request",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"http_referrer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"http_x_forwarded_for":"$http_x_forwarded_for",'
    '"upstream_addr":"$upstream_addr",'
    '"upstream_response_time":"$upstream_response_time"'
'}';

access_log /var/log/nginx/access_json.log json_analytics;

# Common Proxy Headers
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# NPM SSL
server {
    listen 443 ssl;
    server_name npm.ahprostory.ru;
    
    ssl_certificate /etc/nginx/custom_certs/npm.ahprostory.ru_rsa.crt;
    ssl_certificate_key /etc/nginx/custom_certs/npm.ahprostory.ru_rsa.key;

    location / {
        proxy_pass http://iipoc_panel:8080;
    }
}

# Bitrix24 SSL
server {
    listen 443 ssl;
    server_name b24.ahprostory.ru;
    
    ssl_certificate /etc/nginx/custom_certs/b24.ahprostory.ru_rsa.crt;
    ssl_certificate_key /etc/nginx/custom_certs/b24.ahprostory.ru_rsa.key;

    # Main Bitrix Location
    location / {
        proxy_pass http://10.0.1.50:80;
        proxy_read_timeout 900s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Bitrix Push/WebSocket
    location ^~ /bitrix/subws {
        proxy_pass http://10.0.1.50:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # Bitrix Push/Long Polling
    location ^~ /bitrix/sub {
        proxy_pass http://10.0.1.50:80;
        proxy_read_timeout 86400;
    }
}

# VKS SSL
server {
    listen 443 ssl http2;
    server_name vks.ahprostory.ru;
    
    ssl_certificate /etc/letsencrypt/live/vks.ahprostory.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vks.ahprostory.ru/privkey.pem;

    # Jitsi Web Layout
    location / {
        proxy_pass http://10.0.1.130:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # XMPP WebSocket - КРИТИЧЕСКИ ВАЖНО
    location ^~ /xmpp-websocket {
        proxy_pass http://10.0.1.130:80/xmpp-websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # Colibri WebSocket (Video Bridge)
    location ^~ /colibri-ws {
        proxy_pass http://10.0.1.130:80/colibri-ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}

# VKS Statistics SSL
server {
    listen 443 ssl http2;
    server_name stat.vks.ahprostory.ru;

    ssl_certificate /etc/letsencrypt/live/vks.ahprostory.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vks.ahprostory.ru/privkey.pem;

    location / {
        proxy_pass http://10.0.1.130:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# HTTP to HTTPS Redirect
server {
    listen 80;
    server_name npm.ahprostory.ru b24.ahprostory.ru vks.ahprostory.ru stat.vks.ahprostory.ru;
    location / {
        return 301 https://$host$request_uri;
    }
}
