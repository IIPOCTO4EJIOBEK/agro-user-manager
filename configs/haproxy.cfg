# ============================================================================
# ИСПРАВЛЕННАЯ КОНФИГУРАЦИЯ HAProxy ДЛЯ BITRIX24 CLUSTER
# Проблема: UNIQUE ID ERROR из-за отсутствия липких сессий
# Решение: sticky sessions на основе IP + cookie SERVERID
# ============================================================================

global
    log /dev/log local0
    chroot /var/lib/haproxy
    pidfile /var/run/haproxy.pid
    maxconn 20000
    user haproxy
    group haproxy
    daemon
    stats socket /var/lib/haproxy/stats mode 660 level admin user vardo001
    # Оптимизация для Bitrix24
    tune.ssl.default-dh-param 2048

defaults
    log global
    mode http
    option httplog
    option http-server-close
    option forwardfor
    option redispatch 0  # Не переключать сессию на другой сервер
    timeout connect 10s
    timeout client 1m
    timeout http-keep-alive 10s
    timeout server 1m
    timeout tunnel 1h
    # Retries for failed connections
    retries 2

# Frontend - HTTP
frontend http-in
    bind *:80
    
    # WebSocket support
    acl is_websocket hdr(Upgrade) -i websocket
    http-request set-header Connection upgrade if is_websocket
    http-request set-header Upgrade websocket if is_websocket

    # Paths for Push server
    acl path_push_sub   path_beg /bitrix/sub/
    acl path_push_subws path_beg /bitrix/subws/
    acl path_push_pub   path_beg /bitrix/pub/

    use_backend bitrix-push-sub if path_push_sub || path_push_subws
    use_backend bitrix-push-pub if path_push_pub

    default_backend bitrix-web

# Frontend - HTTPS (если SSL терминируется здесь)
# frontend https-in
#     bind *:443 ssl crt /etc/ssl/certs/b24.ahprostory.ru.pem
#     http-request set-header X-Forwarded-Proto https
#     use_backend bitrix-push-sub if path_push_sub || path_push_subws
#     use_backend bitrix-push-pub if path_push_pub
#     default_backend bitrix-web

# Backend - Bitrix24 Web Cluster
backend bitrix-web
    # Балансировка с sticky sessions
    balance roundrobin
    
    # Cookie для липких сессий
    cookie SERVERID insert indirect nocache
    
    # Sticky sessions на основе IP (альтернатива cookie)
    # source
    
    # Health checks
    option httpchk GET /
    http-check expect status 200
    
    # Сервера кластера с sticky sessions
    # stick-table type ip size 100k expire 30m
    # stick on src
    
    server web01 10.0.1.220:80 check cookie web01 weight 100
    server web02 10.0.1.221:80 check cookie web02 weight 100
    server web03 10.0.1.222:80 check cookie web03 weight 100
    
    # Дополнительные настройки для производительности
    http-request set-header X-Forwarded-Port %[dst_port]
    http-request set-header X-Forwarded-Proto https if { ssl_fc }

# Backend - Push Server (Subscribe)
backend bitrix-push-sub
    server push01 10.0.1.230:8893 check

# Backend - Push Server (Publish)
backend bitrix-push-pub
    server push01 10.0.1.230:8895 check

# Statistics
listen stats
    bind *:1936
    stats enable
    stats uri /
    stats auth admin:!P09710023p
    stats refresh 10s
    stats admin if TRUE
